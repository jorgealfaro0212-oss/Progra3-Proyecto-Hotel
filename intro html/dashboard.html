<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Helios Palace</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="bi bi-gear-fill me-2"></i>Helios Admin
            </a>
            <button class="btn btn-outline-danger btn-sm" onclick="logout()">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col-12">
                <h2 class="fw-bold">Panel de Control</h2>
                <p class="text-muted">Gestión de reservas y ocupación en tiempo real.</p>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card stat-card bg-primary text-white shadow-sm">
                    <div class="card-body">
                        <small class="text-uppercase opacity-75">Reservas Pendientes</small>
                        <h2 class="display-6 fw-bold">12</h2>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4 mb-4">
                <div class="card stat-card bg-success text-white shadow-sm">
                    <div class="card-body">
                        <small class="text-uppercase opacity-75">Habitaciones Ocupadas</small>
                        <h2 class="display-6 fw-bold">45</h2>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4 mb-4">
                <div class="card stat-card bg-warning text-dark shadow-sm">
                    <div class="card-body">
                        <small class="text-uppercase opacity-75">Check-ins Hoy</small>
                        <h2 class="display-6 fw-bold">08</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0 mt-2">
            <div class="card-header bg-white py-3 border-bottom">
                <h5 class="mb-0 fw-bold">Últimas Reservas</h5>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-4">Cliente</th>
                                <th>Habitación</th>
                                <th>Fecha</th>
                                <th class="text-center">Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="ps-4 fw-medium">Gustavo Aguilar</td>
                                <td>Suite 204</td>
                                <td>2026-03-10</td>
                                <td class="text-center"><span class="badge bg-success-subtle text-success border border-success px-3">Confirmada</span></td>
                            </tr>
                            <tr>
                                <td class="ps-4 fw-medium">Mirian Rodriguez</td>
                                <td>Doble 101</td>
                                <td>2026-03-12</td>
                                <td class="text-center"><span class="badge bg-warning-subtle text-warning-emphasis border border-warning px-3">Pendiente</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Si no hay sesión, rebota al login
        if (localStorage.getItem('admin_logged') !== 'true') {
            window.location.href = "login.html";
        }

        function logout() {
            localStorage.removeItem('admin_logged');
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
