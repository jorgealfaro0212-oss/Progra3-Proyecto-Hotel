<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Helios Palace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Panel de Administración</a>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12">
                <h1 class="mb-4">Bienvenido, Administrador</h1>
            </div>
            <div class="col-md-4">
                <div class="card bg-primary text-white mb-4">
                    <div class="card-body">Reservas Pendientes: 12</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-success text-white mb-4">
                    <div class="card-body">Habitaciones Ocupadas: 45</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card bg-warning text-dark mb-4">
                    <div class="card-body">Check-ins Hoy: 8</div>
                </div>
            </div>
        </div>

        <div class="card shadow">
            <div class="card-header bg-white">
                <h5 class="mb-0 py-2">Últimas Reservas</h5>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Habitación</th>
                            <th>Fecha</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Gustavo Aguilar</td>
                            <td>Suite 204</td>
                            <td>2026-03-10</td>
                            <td><span class="badge bg-success">Confirmada</span></td>
                        </tr>
                        <tr>
                            <td>Mirian Rodriguez</td>
                            <td>Doble 101</td>
                            <td>2026-03-12</td>
                            <td><span class="badge bg-warning text-dark">Pendiente</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Protección de ruta: Si no está logueado, lo saca
        if (localStorage.getItem('admin_logged') !== 'true') {
            window.location.href = "login.html";
        }

        function logout() {
            localStorage.removeItem('admin_logged');
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
