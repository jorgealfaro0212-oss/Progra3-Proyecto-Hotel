<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - Helios Palace Hotel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/reservas.css">
</head>
<body class="reserva-page">
    
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="index.html">Hotel Helios Palace</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="servicios.html">Servicios</a></li>
                        <li class="nav-item"><a class="nav-link" href="habitaciones.html">Habitaciones</a></li>
                        <li class="nav-item"><a class="nav-link" href="reservas.html">Reservas</a></li>
                        <li class="nav-item"><a class="nav-link" href="ubicacion.html">Ubicación</a></li>
                        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <div class="main-wrapper">
        <main class="hero-reservation">
            <div class="container d-flex flex-column align-items-center">
                
                <div class="title-badge">
                    <h1>RESERVAS</h1>
                </div>

                <div class="booking-card">
                    <form id="reservation-form">
                        <div class="mb-3 text-start">
                            <label for="name" class="form-label">Nombre Completo</label>
                            <input type="text" id="name" class="form-control" placeholder="Juan Freet" required>
                        </div>

                        <div class="mb-3 text-start">
                            <label for="email" class="form-label">Correo Electrónico</label>
                            <input type="email" id="email" class="form-control" placeholder="fa@mail.com" required>
                        </div>

                        <div class="row mb-3">
                            <div class="col-6 text-start">
                                <label for="checkin" class="form-label">Entrada</label>
                                <input type="date" id="checkin" class="form-control" required>
                            </div>
                            <div class="col-6 text-start">
                                <label for="checkout" class="form-label">Salida</label>
                                <input type="date" id="checkout" class="form-control" required>
                            </div>
                        </div>

                        <div class="mb-4 text-start">
                            <label for="roomType" class="form-label">Tipo de Habitación</label>
                            <select id="roomType" class="form-select" required>
                                <option value="" disabled selected>Seleccione una opción</option>
                                <option value="85">Doble Estándar ($85)</option>
                                <option value="95">Doble Vista Jardín ($95)</option>
                                <option value="115">Doble Deluxe ($115)</option>
                                <option value="135">Deluxe Vista Piscina ($135)</option>
                                <option value="170">Familiar Superior ($170)</option>
                                <option value="185">Familiar Vista Piscina ($185)</option>
                                <option value="210">Suite Familiar ($210)</option>
                                <option value="250">Suite Presidencial ($250)</option>
                            </select>
                        </div>

                        <div class="total-section mb-4">
                            <p>Total a pagar: <span class="price-amount">$<span id="totalPrice">0</span></span></p>
                        </div>

                        <button type="submit" class="btn btn-confirm">Confirmar Reserva</button>
                    </form>
                </div>
            </div>
        </main>

        <footer class="custom-footer">
            <div class="container text-center">
                <p>© 2026 Helios Palace Hotel | Todos los derechos reservados</p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/reservas.js"></script>
</body>
</html>
